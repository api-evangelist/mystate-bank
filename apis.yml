    type: OpenAPI
  description: Consumer-AUTHORIZED CDR payees surface implementing the shared DSB Consumer
    Data Standards Banking API. Covers Get Payees (GET /banking/payees) and Get Payee
    Detail (GET /banking/payees/{payeeId}), returning a consumer's saved payee list
    and per-payee detail. Access requires an explicit consumer authorisation obtained
    by an Accredited Data Recipient (ADR) over the CDR mTLS/FAPI security profile;
    not publicly callable without a valid consent and token.
