  - Open Banking
  - Product Reference Data
  - Banking
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://mystate.com.au/help-centre/open-banking-help/
  baseURL: https://public.cdr.mystate.com.au/cds-au/v1/banking/products
  properties:
  - url: https://mystate.com.au/help-centre/open-banking-help/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#get-products
    type: APIReference
  - url: openapi/mystate-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, UNAUTHENTICATED Product Reference Data (PRD) API mandated by
    the Australian Consumer Data Right and conforming to the shared DSB Consumer Data
    Standards (CDS) Banking API. Exposes Get Products (GET /banking/products) and Get
    Product Detail (GET /banking/products/{productId}), versioned via the x-v header,
    for openly discovering MyState Bank's accounts, loans and card products. Confirmed
    live returning HTTP 200 with a data.products array and x-v 3 on 2026-07-20.
- aid: mystate-bank:mystate-bank-cdr-accounts-balances-api
  name: MyState Bank CDR Accounts & Balances API
  tags:
  - CDR
  - Open Banking
  - Accounts
  - Balances
  - Banking
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://mystate.com.au/help-centre/open-banking-help/
  baseURL: https://public.cdr.mystate.com.au/cds-au/v1/banking/accounts
  properties:
  - url: https://mystate.com.au/help-centre/open-banking-help/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#get-accounts
    type: APIReference
  - url: openapi/mystate-bank-cds-banking-openapi.yml
    type: OpenAPI
  description: Consumer-AUTHORIZED CDR banking surface for accounts and balances,
    implementing the shared DSB Consumer Data Standards Banking API. Covers Get Accounts
    (GET /banking/accounts), Get Bulk Balances (GET /banking/accounts/balances), Get
    Account Balance (GET /banking/accounts/{accountId}/balance) and Get Account Detail
    (GET /banking/accounts/{accountId}). Access requires an explicit consumer authorisation
    obtained by an Accredited Data Recipient (ADR) over the CDR mTLS/FAPI security
    profile; these endpoints are not publicly callable without a valid consent and
    token.
