name: MyState Bank
kind: company
description: MyState Bank is an Australian retail bank headquartered in Hobart, Tasmania,
  and the principal banking brand of ASX-listed MyState Limited (ASX:MYS). It traces
  its origins to a Tasmanian credit union serving teachers, police and nurses, formed
  its current group in the 2009 merger of Tasmanian Perpetual Trustees and MyState
  Financial, was authorised to use the MyState Bank name in 2014, and in February
  2025 completed a merger with Queensland regional lender Auswide Bank to create one
  of Australia's larger regional banking groups. As an authorised deposit-taking institution
  (ADI) it is a regulated data holder under the Australian Consumer Data Right (CDR
  / Open Banking) and exposes a public, unauthenticated Product Reference Data (PRD)
  API conforming to the Consumer Data Standards (CDS). Consumer data sharing beyond
  PRD is protected under the CDR's accredited-data-recipient model.
