    type: OpenAPI
  description: Consumer-AUTHORIZED CDR surface for regular payment arrangements, implementing
    the shared DSB Consumer Data Standards Banking API. Covers Get Direct Debits For
    Account and Get Bulk Direct Debits (/banking/accounts/{accountId}/direct-debits,
    /banking/accounts/direct-debits), plus Get Scheduled Payments For Account and Get
    Bulk Scheduled Payments (/banking/accounts/{accountId}/payments/scheduled, /banking/payments/scheduled).
    Access requires an explicit consumer authorisation obtained by an Accredited Data
    Recipient (ADR) over the CDR mTLS/FAPI security profile; not publicly callable
    without a valid consent and token.
