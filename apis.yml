  description: Consumer-AUTHORIZED CDR transactions surface implementing the shared
    DSB Consumer Data Standards Banking API. Covers Get Transactions For Account (GET
    /banking/accounts/{accountId}/transactions) and Get Transaction Detail (GET /banking/accounts/{accountId}/transactions/{transactionId}),
    supporting date, amount and text filtering. Access requires an explicit consumer
    authorisation obtained by an Accredited Data Recipient (ADR) over the CDR mTLS/FAPI
    security profile; not publicly callable without a valid consent and token.
